<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - PetStore Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:linear-gradient(135deg,#0f172a,#1e293b);color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;backdrop-filter:blur(20px);box-shadow:0 24px 60px rgba(0,0,0,0.4);}
.login-title{text-align:center;font-size:22px;font-weight:700;margin-bottom:4px;}
.login-sub{text-align:center;font-size:13px;color:#64748b;margin-bottom:28px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.form-group input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:15px;outline:none;transition:.2s;}
.form-group input:focus{border-color:#3b82f6;background:rgba(59,130,246,0.08);}
.form-group input::placeholder{color:rgba(255,255,255,0.3);}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,#3b82f6,#2563eb);border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:6px;transition:.2s;letter-spacing:.3px;}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(59,130,246,0.35);}
.error-msg{text-align:center;color:#f87171;font-size:13px;margin-top:12px;min-height:18px;}
</style>
</head>
<body>
<div class="login-card">
  <h1 class="login-title">Welcome to PetStorePro</h1>
  <p class="login-sub">Login to continue</p>
  <div class="form-group">
    <label>Username</label>
    <input id="user" placeholder="admin" autocomplete="username">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input id="pass" type="password" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="login-btn" onclick="login()">Login</button>
  <p class="error-msg" id="msg"></p>
</div>
<script src="/static/js/auth.js"></script>
</body>
</html>
