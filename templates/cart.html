<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart – PetStore Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:linear-gradient(135deg,#0f172a,#1e293b);color:#f1f5f9;min-height:100vh;}
.navbar{display:flex;justify-content:space-between;align-items:center;padding:14px 32px;background:rgba(255,255,255,0.04);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;}
.brand{font-size:20px;font-weight:700;}
.navbar-links{display:flex;gap:8px;align-items:center;}
.navbar a,.navbar button{color:#93c5fd;text-decoration:none;font-size:14px;padding:8px 14px;border-radius:8px;transition:.2s;background:transparent;border:none;cursor:pointer;}
.navbar a:hover,.navbar button:hover{background:rgba(255,255,255,0.08);}
.page{max-width:680px;margin:40px auto;padding:0 20px;}
h1{font-size:26px;font-weight:700;margin-bottom:24px;}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:24px;}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.07);}
.cart-item:last-of-type{border-bottom:none;}
.item-info{flex:1;}
.item-name{font-size:15px;font-weight:600;margin-bottom:3px;}
.item-price{font-size:13px;color:#94a3b8;}
.item-qty{display:flex;align-items:center;gap:10px;}
.qty-btn{background:rgba(255,255,255,0.08);border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s;}
.qty-btn:hover{background:#3b82f6;}
.qty-num{font-size:15px;font-weight:600;min-width:24px;text-align:center;}
.item-sub{font-size:15px;font-weight:700;color:#3b82f6;min-width:80px;text-align:right;}
.remove-btn{background:none;border:none;color:#ef4444;cursor:pointer;font-size:18px;margin-left:12px;padding:4px;border-radius:4px;transition:.2s;}
.remove-btn:hover{background:rgba(239,68,68,0.15);}
.divider{border:none;border-top:1px solid rgba(255,255,255,0.1);margin:16px 0;}
.total-row{display:flex;justify-content:space-between;align-items:center;font-size:22px;font-weight:700;}
.total-row span:last-child{color:#3b82f6;}
.empty-msg{text-align:center;padding:48px 0;color:#475569;}
.empty-msg p{font-size:16px;margin-bottom:16px;}
.empty-msg a{color:#3b82f6;text-decoration:none;font-weight:600;}
.form-section{margin-top:20px;}
.form-section h3{font-size:15px;font-weight:600;margin-bottom:12px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-row.single{grid-template-columns:1fr;}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.form-group label{font-size:12px;color:#64748b;font-weight:500;}
.form-group input{padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#fff;font-size:14px;outline:none;transition:.2s;}
.form-group input:focus{border-color:#3b82f6;}
.form-group input::placeholder{color:rgba(255,255,255,0.3);}
.pay-btn{width:100%;margin-top:20px;padding:16px;background:linear-gradient(135deg,#3b82f6,#2563eb);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;transition:.2s;letter-spacing:.3px;}
.pay-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(59,130,246,0.4);}
.pay-btn:disabled{background:#334155;cursor:not-allowed;transform:none;box-shadow:none;}
</style>
</head>
<body>
<nav class="navbar">
  <div class="brand">🛒 Cart</div>
  <div class="navbar-links">
    <a href="{{ url_for('index') }}">← Back to Store</a>
    <button type="button" onclick="logoutFromCart()">Logout</button>
  </div>
</nav>
<div class="page">
  <h1>Your Cart</h1>
  <div class="card">
    <div id="cart-empty" class="empty-msg" style="display:none;">
      <p>Your cart is empty!</p>
      <a href="{{ url_for('index') }}">Continue Shopping →</a>
    </div>
    <div id="cart-items"></div>
    <hr class="divider" id="divider" style="display:none;">
    <div class="total-row" id="total-row" style="display:none;">
      <span>Total</span>
      <span>₹<span id="total-amount">0</span></span>
    </div>
    <div class="form-section" id="form-section" style="display:none;">
      <h3>Contact Details</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input id="c-name" placeholder="Your name">
        </div>
        <div class="form-group">
          <label>Phone *</label>
          <input id="c-phone" placeholder="+91 9876543210" type="tel">
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label>Email</label>
          <input id="c-email" placeholder="you@email.com" type="email">
        </div>
      </div>
    </div>
    <button class="pay-btn" id="pay-btn" style="display:none;" onclick="payNow()">
      🔒 Pay Securely with Razorpay
    </button>
  </div>
</div>
<script>
const RAZORPAY_KEY = "{{ razorpay_key }}";

// Prefill email from session if available
(async function prefillUser() {
  try {
    const res  = await fetch('/api/session');
    const data = await res.json();
    if (data.user && data.user.email) {
      const el = document.getElementById('c-email');
      if (el && !el.value) el.value = data.user.email;
    }
  } catch (e) {}
})();

async function logoutFromCart() {
  try {
    await fetch('/api/user/logout', { method: 'POST' });
  } catch (e) {
    console.warn('Logout failed:', e);
  }
  window.location.href = '/login';
}
</script>
<script src="/static/js/payment.js"></script>
</body>
</html>
